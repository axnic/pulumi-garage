version: 2
project_name: pulumi-garage
builds:
  - id: build-provider
    dir: provider
    env:
      - CGO_ENABLED=0
      - GO111MODULE=on
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    main: ./cmd/pulumi-resource-garage/
    ldflags:
      - -s
      - -w
      - -X
        github.com/axnic/pulumi-garage/provider.Version={{.Tag}}
    binary: pulumi-resource-garage
archives:
  - name_template: "{{ .Binary }}-{{ .Tag }}-{{ .Os }}-{{ .Arch }}"
    id: archive
snapshot:
  version_template: "{{ .Tag }}-SNAPSHOT"
changelog:
  use: github
release:
  disable: false
  # Tags with a semver prerelease segment (e.g. v1.0.0-alpha.1) are marked
  # as GitHub prereleases automatically - one config handles both cases.
  prerelease: auto
