# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Release — build and publish a tagged version
#
# Triggered by pushing a tag matching v* (e.g. v1.0.0, or v1.0.0-alpha.1 for
# a prerelease - goreleaser marks prereleases on GitHub automatically based
# on the semver tag, see .goreleaser.yml).
#
# What it does:
#   1. Builds the provider binary for darwin/linux/windows (amd64+arm64) via
#      goreleaser and publishes them as a GitHub Release with checksums.
#      This alone is enough for `pulumi plugin install resource garage
#      <version>` to work.
#   2. Pushes a second, path-prefixed tag (sdk/go/pulumi-garage/vX.Y.Z) so
#      `go get github.com/axnic/pulumi-garage/sdk/go/pulumi-garage@vX.Y.Z`
#      resolves cleanly - the go SDK is a real Go module, but it lives in a
#      subdirectory of this repo, and Go's module versioning for modules in
#      subdirectories specifically needs a tag prefixed with that
#      subdirectory (see https://go.dev/ref/mod#vcs-version); the plain
#      vX.Y.Z tag alone only gets you an unclean pseudo-version.
#   3. Publishes the other 4 SDKs (nodejs, python, dotnet, java) to their
#      respective registries, each independently gated on its own secret(s)
#      being configured - see RELEASING.md for exactly which secrets to add
#      and how. A registry you haven't set up secrets for yet is skipped,
#      not failed, so releases keep working while you onboard registries
#      one at a time.
#
# See RELEASING.md for the full picture (required secrets, how to cut a
# release, what happens if a step is skipped).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  provider-binaries:
    name: Provider binaries (GitHub Release)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # goreleaser needs full history for its changelog

      - name: Install tools via mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          cache: true

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tag-go-sdk:
    name: Tag Go SDK for module resolution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: true

      - name: Push sdk/go/pulumi-garage/${{ github.ref_name }}
        run: |
          git tag "sdk/go/pulumi-garage/${{ github.ref_name }}" "${{ github.ref_name }}"
          git push origin "sdk/go/pulumi-garage/${{ github.ref_name }}"

  publish-sdks:
    name: Publish SDKs
    runs-on: ubuntu-latest
    # id-token: write is required for npm's and NuGet's OIDC-based trusted
    # publishing (both exchange this workflow's OIDC token for a short-lived
    # publish credential instead of a stored secret) - see RELEASING.md.
    permissions:
      contents: read
      id-token: write
    # `if:` conditions can't reference the `secrets` context directly
    # ("Unrecognized named-value: 'secrets'") - only `env:` can, so each
    # registry's "is it configured" check is computed here once and read
    # back via `env.HAS_*` in the steps below.
    env:
      HAS_NPM_TOKEN: "true" # npm uses trusted publishers, so we always have a token for it (see RELEASING.md)
      HAS_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN != '' }}
      HAS_NUGET_KEY: "true" # NuGet uses OIDC, so we always can generate a key for it (see RELEASING.md)
      HAS_MAVEN_CREDS: ${{ secrets.SIGNING_KEY != '' && secrets.PUBLISH_REPO_USERNAME != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install tools via mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          cache: true

      - name: Determine release version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build provider (needed to generate the schema)
        run: make provider

      # --- Node.js / npm -----------------------------------------------
      - name: Build Node.js SDK
        if: ${{ env.HAS_NPM_TOKEN == 'true' }}
        run: make nodejs_sdk PROVIDER_VERSION="${{ steps.version.outputs.version }}"

      - name: Publish to npm
        if: ${{ env.HAS_NPM_TOKEN == 'true' }}
        working-directory: sdk/nodejs/bin
        run: |
          # npm refuses to publish a prerelease version (contains "-") to
          # the default "latest" tag - verified by trying it.
          if [[ "${{ steps.version.outputs.version }}" == *-* ]]; then
            npm publish --access public --tag next --provenance
          else
            npm publish --access public --provenance
          fi

      # --- Python / PyPI -------------------------------------------------
      - name: Build Python SDK
        if: ${{ env.HAS_PYPI_TOKEN == 'true' }}
        run: make python_sdk PROVIDER_VERSION="${{ steps.version.outputs.version }}"

      - name: Publish to PyPI
        if: ${{ env.HAS_PYPI_TOKEN == 'true' }}
        working-directory: sdk/python/bin
        run: |
          # make python_sdk creates the venv in sdk/python/, one level up
          # from sdk/python/bin/ where the build output (dist/) lands.
          ../venv/bin/python -m pip install twine
          ../venv/bin/python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      # --- .NET / NuGet ---------------------------------------------------
      - name: Build .NET SDK
        if: ${{ env.HAS_NUGET_KEY == 'true' }}
        run: make dotnet_sdk PROVIDER_VERSION="${{ steps.version.outputs.version }}"

      - name: Login to NuGet (OIDC → temp API key)
        if: ${{ env.HAS_NUGET_KEY == 'true' }}
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: nuget_login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        if: ${{ env.HAS_NUGET_KEY == 'true' }}
        run: |
          dotnet nuget push "sdk/dotnet/bin/Debug/*.nupkg" \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # --- Java / Maven Central ------------------------------------------
      # Needs a Sonatype/Maven Central account (PUBLISH_REPO_USERNAME/
      # PUBLISH_REPO_PASSWORD) and a GPG key for signing (SIGNING_KEY/
      # SIGNING_PASSWORD) - Maven Central rejects unsigned artifacts. See
      # RELEASING.md for how to obtain both.
      - name: Publish Java SDK to Maven Central
        if: ${{ env.HAS_MAVEN_CREDS == 'true' }}
        working-directory: sdk/java
        run: gradle --console=plain publish
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          PUBLISH_REPO_USERNAME: ${{ secrets.PUBLISH_REPO_USERNAME }}
          PUBLISH_REPO_PASSWORD: ${{ secrets.PUBLISH_REPO_PASSWORD }}
