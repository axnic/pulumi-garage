# Disposable single-node Garage cluster for local and CI end-to-end tests.
# Usage: `make test_e2e` (see Makefile), or manually:
#
#   docker compose -f docker-compose.e2e.yml up --wait
#   export GARAGE_ADMIN_ENDPOINT=http://localhost:3903
#   export GARAGE_ADMIN_TOKEN=$(awk -F'"' '/admin_token/{print $2}' test/e2e/garage.toml)
#   go test -tags=all ./examples/...
#   docker compose -f docker-compose.e2e.yml down -v
services:
  garage:
    image: dxflrs/garage:v2.3.0
    command: ["/garage", "server", "--single-node"]
    ports:
      - "3900:3900"
      - "3903:3903"
    volumes:
      - ./test/e2e/garage.toml:/etc/garage.toml:ro
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s
